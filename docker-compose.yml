version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-researchai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-researchai}
      POSTGRES_DB: ${POSTGRES_DB:-researchai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-researchai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # FastAPI backend
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-researchai}:${POSTGRES_PASSWORD:-researchai}@db:5432/${POSTGRES_DB:-researchai}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      GROQ_API_KEY: ${GROQ_API_KEY}
      IEEE_API_KEY: ${IEEE_API_KEY:-}
      SPRINGER_API_KEY: ${SPRINGER_API_KEY:-}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      # Tells scraper.py to use system chromium instead of webdriver-manager
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
    volumes:
      - faiss_data:/app/faiss_indexes
      - pdf_data:/app/uploads
    ports:
      - "8000:8000"

  # ──────────────────────────────────────────────
  # React frontend (dev mode)
  # For production: build and serve with nginx
  # ──────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  # ──────────────────────────────────────────────
  # Selenium standalone Chrome (optional)
  # Useful when you want a dedicated browser for
  # Selenium scraping fallbacks.
  # Comment out if not needed.
  # ──────────────────────────────────────────────
  selenium-hub:
    image: selenium/standalone-chrome:latest
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      - "4444:4444"
    environment:
      SE_NODE_MAX_SESSIONS: 4
      SE_NODE_SESSION_TIMEOUT: 300

volumes:
  postgres_data:
  faiss_data:
  pdf_data:
